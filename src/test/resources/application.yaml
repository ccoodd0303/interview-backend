spring:
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    open-in-view: false

ai:
  server:
    url: http://localhost:8000

cors:
  allowed-origins: http://localhost:3000
